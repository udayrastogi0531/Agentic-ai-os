# ==============================================================================
# Uday AI OS — Production Kubernetes Manifests
# ==============================================================================
# 
# This file defines the complete container deployment architecture for Uday AI OS.
# Includes:
#   - Namespace setup
#   - Secrets & ConfigMaps for unified environment management
#   - PersistentVolumeClaims for durable storage
#   - Datastores (PostgreSQL, Redis, ChromaDB)
#   - Local LLM Runner (Ollama)
#   - Core API Backend (FastAPI)
#   - Web Frontend Client (Next.js)
#   - Ingress Routing Controller (Nginx format)
# 
# ==============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: udayai
---

# ── 1. CONFIGURATION & SECRETS ────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: udayai-config
  namespace: udayai
data:
  POSTGRES_USER: "udayai"
  POSTGRES_DB: "udayai_db"
  DATABASE_URL: "postgresql+asyncpg://udayai:udayai_password@postgres-service:5432/udayai_db"
  REDIS_URL: "redis://redis-service:6379/0"
  CHROMA_HOST: "chromadb-service"
  CHROMA_PORT: "8000"
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_DEFAULT_MODEL: "qwen2.5:7b"
  OLLAMA_CODE_MODEL: "deepseek-coder:6.7b"
  GEMINI_MODEL: "gemini-1.5-flash"
  OPENAI_MODEL: "gpt-4o-mini"
  NEXT_PUBLIC_API_URL: "http://udayai.local/api"
  NEXT_PUBLIC_WS_URL: "ws://udayai.local/ws"
  NEXTAUTH_URL: "http://udayai.local"
---

apiVersion: v1
kind: Secret
metadata:
  name: udayai-secrets
  namespace: udayai
type: Opaque
data:
  # Base64 encoded values. Replace these in real production deployments.
  POSTGRES_PASSWORD: "dWRheWFpX3Bhc3N3b3Jk" # udayai_password
  NEXTAUTH_SECRET: "Y2hhbmdlLW1lLXNlY3JldA==" # change-me-secret
  OPENAI_API_KEY: ""
  GOOGLE_API_KEY: ""
  GITHUB_TOKEN: ""
---

# ── 2. PERSISTENT STORAGE CLAIMS ──────────────────────────────────────────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: udayai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: udayai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: udayai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: udayai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: upload-pvc
  namespace: udayai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---

# ── 3. DATASTORE DEPLOYMENTS ──────────────────────────────────────────────────

# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: udayai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: udayai-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: udayai-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: udayai-config
                  key: POSTGRES_DB
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "udayai", "-d", "udayai_db"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "udayai", "-d", "udayai_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: udayai
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---

# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: udayai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: udayai
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
---

# ChromaDB (Vector Search Engine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: udayai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "false"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chroma-storage
              mountPath: /chroma/chroma
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
---

apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: udayai
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: chromadb
---

# ── 4. OLLAMA LOCAL LLM RUNNER ────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: udayai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            # Uncomment below sections to request GPU allocations in cluster
            # requests:
            #   nvidia.com/gpu: 1
            # limits:
            #   nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: 8Gi
            requests:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc
---

apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: udayai
spec:
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: ollama
---

# ── 5. APPLICATION SERVICES (BACKEND & FRONTEND) ──────────────────────────────

# FastAPI Backend API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: udayai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: udayrastogi0531/udayai-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: udayai-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: udayai-secrets
                  key: POSTGRES_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: udayai-secrets
                  key: OPENAI_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: udayai-secrets
                  key: GOOGLE_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: udayai-secrets
                  key: GITHUB_TOKEN
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: upload-storage
              mountPath: /app/data/uploads
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: upload-storage
          persistentVolumeClaim:
            claimName: upload-pvc
---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: udayai
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: backend
---

# Next.js Frontend Web Client
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: udayai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: udayrastogi0531/udayai-frontend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: udayai-config
          env:
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: udayai-secrets
                  key: NEXTAUTH_SECRET
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: udayai
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
---

# ── 6. NETWORK INGRESS ROUTER ─────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: udayai-ingress
  namespace: udayai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "backend-service"
spec:
  rules:
    - host: udayai.local
      http:
        paths:
          # Route Backend APIs
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Route WebSocket stream
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Route Next.js Page resources & static contents
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
