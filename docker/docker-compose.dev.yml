# ============================================
# Uday AI — Docker Compose (Development)
# ============================================

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: udayai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-udayai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-udayai_password}
      POSTGRES_DB: ${POSTGRES_DB:-udayai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U udayai -d udayai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: udayai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ChromaDB ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: udayai-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

  # ── Backend (FastAPI) ───────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: udayai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://udayai:udayai_password@postgres:5432/udayai_db
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - ../backend:/app
      - upload_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    restart: unless-stopped

  # ── Frontend (Next.js) ─────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: udayai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    restart: unless-stopped

  # ── Ollama (Local LLM) ─────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: udayai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  upload_data:
  ollama_data:
